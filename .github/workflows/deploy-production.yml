name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
      CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
      CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
      DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci --no-audit --no-fund
          npm run build:css
          echo "${GITHUB_SHA}" > dist/asset-version.txt

      - name: Validate required deploy secrets
        run: |
          set -e
          if [ -z "$CPANEL_FTP_HOST" ]; then
            echo "::error::Missing secret: CPANEL_FTP_HOST"
            exit 1
          fi
          if [ -z "$CPANEL_FTP_USER" ]; then
            echo "::error::Missing secret: CPANEL_FTP_USER"
            exit 1
          fi
          if [ -z "$CPANEL_FTP_PASSWORD" ]; then
            echo "::error::Missing secret: CPANEL_FTP_PASSWORD"
            exit 1
          fi
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::Missing secret: DEPLOY_PATH"
            exit 1
          fi

      - name: Resolve deploy paths
        id: paths
        run: |
          set -e
          DEPLOY_DIR="$(printf '%s' "$DEPLOY_PATH" | tr -d '\r' | sed 's/^ *//;s/ *$//')"
          if [ -z "$DEPLOY_DIR" ]; then
            echo "::error::DEPLOY_PATH resolved to empty value"
            exit 1
          fi

          FTP_DIR="$DEPLOY_DIR"
          HOME_PREFIX="/home/$CPANEL_FTP_USER"
          if [ "${FTP_DIR#${HOME_PREFIX}}" != "$FTP_DIR" ]; then
            FTP_DIR="${FTP_DIR#${HOME_PREFIX}}"
          fi

          if [ -z "$FTP_DIR" ]; then
            FTP_DIR="/"
          fi

          case "$FTP_DIR" in
            /*) ;;
            *) FTP_DIR="/$FTP_DIR" ;;
          esac

          case "$FTP_DIR" in
            */) ;;
            *) FTP_DIR="$FTP_DIR/" ;;
          esac

          echo "ftp_dir=$FTP_DIR" >> "$GITHUB_OUTPUT"
          echo "Using FTP directory: $FTP_DIR"

      - name: Generate Passenger restart signal
        run: |
          set -e
          mkdir -p tmp
          date -u +"%Y-%m-%dT%H:%M:%SZ deploy ${GITHUB_SHA}" > tmp/restart.txt
          echo "Wrote restart signal:"
          cat tmp/restart.txt

      - name: Warn on dependency changes
        run: |
          set -e
          echo "Reminder: if package-lock.json changed, run 'Run NPM Install' in the"
          echo "cPanel Node.js App UI once. Production node_modules are not uploaded via FTP."

      - name: Upload files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ env.CPANEL_FTP_HOST }}
          username: ${{ env.CPANEL_FTP_USER }}
          password: ${{ env.CPANEL_FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: ${{ steps.paths.outputs.ftp_dir }}
          state-name: .ftp-deploy-sync-state-v2.json
          exclude: |
            **/public/uploads/**
            **/.git*/**
            **/.git*
            **/node_modules/**
            **/.env*
            **/.github/**
            **/.DS_Store
            **/.vscode/**
            **/.idea/**
            **/.build/**
            **/dist/css/**

      - name: Health check - verify app responds
        run: |
          set -e
          echo "Waiting for app to start..."
          sleep 20

          PRODUCTION_URL="${{ secrets.PRODUCTION_URL || 'https://joelebukatobi.dev' }}"
          echo "Checking health at: $PRODUCTION_URL"

          for i in 1 2 3 4 5 6; do
            if curl -sf "$PRODUCTION_URL" > /dev/null; then
              echo "✅ Health check passed - app is responding"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "❌ Health check failed - app is not responding"
          echo "If the app fails to boot, check cPanel Node.js App logs. A failed"
          echo "migration aborts startup by design (see src/db/run-migrations.js)."
          echo "If package-lock.json changed, run 'Run NPM Install' in cPanel."
          exit 1
