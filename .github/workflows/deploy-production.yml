name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
      CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
      CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
      DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
      CPANEL_SSH_HOST: ${{ secrets.CPANEL_FTP_HOST }}
      CPANEL_SSH_USER: ${{ secrets.CPANEL_FTP_USER }}
      CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
      CPANEL_SSH_PORT: 22
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci --no-audit --no-fund
          npm run build:css

      - name: Validate required deploy secrets
        run: |
          set -e
          if [ -z "$CPANEL_FTP_HOST" ]; then
            echo "::error::Missing secret: CPANEL_FTP_HOST"
            exit 1
          fi
          if [ -z "$CPANEL_FTP_USER" ]; then
            echo "::error::Missing secret: CPANEL_FTP_USER"
            exit 1
          fi
          if [ -z "$CPANEL_FTP_PASSWORD" ]; then
            echo "::error::Missing secret: CPANEL_FTP_PASSWORD"
            exit 1
          fi
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::Missing secret: DEPLOY_PATH"
            exit 1
          fi

      - name: Resolve deploy paths
        id: paths
        run: |
          set -e
          DEPLOY_DIR="$(printf '%s' "$DEPLOY_PATH" | tr -d '\r' | sed 's/^ *//;s/ *$//')"
          if [ -z "$DEPLOY_DIR" ]; then
            echo "::error::DEPLOY_PATH resolved to empty value"
            exit 1
          fi

          FTP_DIR="$DEPLOY_DIR"
          HOME_PREFIX="/home/$CPANEL_FTP_USER"
          if [ "${FTP_DIR#${HOME_PREFIX}}" != "$FTP_DIR" ]; then
            FTP_DIR="${FTP_DIR#${HOME_PREFIX}}"
          fi

          if [ -z "$FTP_DIR" ]; then
            FTP_DIR="/"
          fi

          case "$FTP_DIR" in
            /*) ;;
            *) FTP_DIR="/$FTP_DIR" ;;
          esac

          case "$FTP_DIR" in
            */) ;;
            *) FTP_DIR="$FTP_DIR/" ;;
          esac

          echo "deploy_dir=$DEPLOY_DIR" >> "$GITHUB_OUTPUT"
          echo "ftp_dir=$FTP_DIR" >> "$GITHUB_OUTPUT"
          echo "Using FTP directory: $FTP_DIR"

      - name: Detect SSH configuration
        id: ssh_check
        run: |
          if [ -n "$CPANEL_SSH_HOST" ] && [ -n "$CPANEL_SSH_USER" ] && [ -n "$CPANEL_SSH_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ env.CPANEL_FTP_HOST }}
          username: ${{ env.CPANEL_FTP_USER }}
          password: ${{ env.CPANEL_FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: ${{ steps.paths.outputs.ftp_dir }}
          state-name: .ftp-deploy-sync-state-v2.json
          exclude: |
            **/public/uploads/**
            **/.git*/**
            **/.git*
            **/node_modules/**
            **/.env*
            **/.github/**
            **/.DS_Store
            **/tmp/**
            **/.vscode/**
            **/.idea/**
            **/.build/**
            **/dist/css/**

      - name: Prepare remote deploy script
        if: steps.ssh_check.outputs.enabled == 'true'
        env:
          DEPLOY_DIR: ${{ steps.paths.outputs.deploy_dir }}
          FTP_DIR: ${{ steps.paths.outputs.ftp_dir }}
        run: |
          mkdir -p tmp
          python3 <<'PY'
          import os
          from pathlib import Path

          text = Path("scripts/deploy-remote.sh").read_text()
          text = text.replace("@DEPLOY_DIR@", os.environ["DEPLOY_DIR"])
          text = text.replace("@FTP_DIR@", os.environ["FTP_DIR"])
          Path("tmp/deploy-remote.run.sh").write_text(text)
          PY
          chmod +x tmp/deploy-remote.run.sh

      - name: SSH connectivity check
        if: steps.ssh_check.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.CPANEL_SSH_HOST }}
          username: ${{ env.CPANEL_SSH_USER }}
          key: ${{ env.CPANEL_SSH_KEY }}
          port: ${{ env.CPANEL_SSH_PORT }}
          script: |
            echo "SSH connectivity OK"
            echo "user=$(whoami)"
            echo "home=$HOME"
            echo "shell=${SHELL:-unknown}"

      - name: Install production dependencies and restart app
        if: steps.ssh_check.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.CPANEL_SSH_HOST }}
          username: ${{ env.CPANEL_SSH_USER }}
          key: ${{ env.CPANEL_SSH_KEY }}
          port: ${{ env.CPANEL_SSH_PORT }}
          command_timeout: 30m
          debug: true
          script_path: tmp/deploy-remote.run.sh

      - name: Verify deployed files on server
        if: steps.ssh_check.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.CPANEL_SSH_HOST }}
          username: ${{ env.CPANEL_SSH_USER }}
          key: ${{ env.CPANEL_SSH_KEY }}
          port: ${{ env.CPANEL_SSH_PORT }}
          script: |
            set -e
            DEPLOY_DIR="${{ steps.paths.outputs.deploy_dir }}"
            cd "$DEPLOY_DIR"
            pwd
            ls -la

      - name: Health check - verify app responds
        if: steps.ssh_check.outputs.enabled == 'true'
        run: |
          set -e
          echo "Waiting for app to start..."
          sleep 10
          
          PRODUCTION_URL="${{ secrets.PRODUCTION_URL || 'https://joelebukatobi.dev' }}"
          echo "Checking health at: $PRODUCTION_URL"
          
          # Retry up to 3 times with 5 second intervals
          for i in 1 2 3; do
            if curl -sf "$PRODUCTION_URL" > /dev/null; then
              echo "✅ Health check passed - app is responding"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          
          echo "❌ Health check failed - app is not responding"
          exit 1
