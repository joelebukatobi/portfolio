name: Deploy Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
      CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
      CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      CPANEL_SSH_HOST: ${{ secrets.CPANEL_FTP_HOST }}
      CPANEL_SSH_USER: ${{ secrets.CPANEL_FTP_USER }}
      CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
      CPANEL_SSH_PORT: 22
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci --no-audit --no-fund
          npm run build:css
          grep -q 'blogpost__meta' dist/css/app.css || (echo "::error::Post page styles missing from CSS build output" && exit 1)
          grep -q 'blogpost__comment-field' dist/css/app.css || (echo "::error::Comment form styles missing from CSS build output" && exit 1)

      - name: Validate required deploy secrets
        run: |
          set -e
          if [ -z "$CPANEL_FTP_HOST" ]; then
            echo "::error::Missing secret: CPANEL_FTP_HOST"
            exit 1
          fi
          if [ -z "$CPANEL_FTP_USER" ]; then
            echo "::error::Missing secret: CPANEL_FTP_USER"
            exit 1
          fi
          if [ -z "$CPANEL_FTP_PASSWORD" ]; then
            echo "::error::Missing secret: CPANEL_FTP_PASSWORD"
            exit 1
          fi
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::Missing secret: DEPLOY_PATH"
            exit 1
          fi

      - name: Resolve deploy paths
        id: paths
        run: |
          set -e
          DEPLOY_DIR="$(printf '%s' "$DEPLOY_PATH" | tr -d '\r' | sed 's/^ *//;s/ *$//')"
          if [ -z "$DEPLOY_DIR" ]; then
            echo "::error::DEPLOY_PATH resolved to empty value"
            exit 1
          fi

          FTP_DIR="$DEPLOY_DIR"
          HOME_PREFIX="/home/$CPANEL_FTP_USER"
          if [ "${FTP_DIR#${HOME_PREFIX}}" != "$FTP_DIR" ]; then
            FTP_DIR="${FTP_DIR#${HOME_PREFIX}}"
          fi

          if [ -z "$FTP_DIR" ]; then
            FTP_DIR="/"
          fi

          case "$FTP_DIR" in
            /*) ;;
            *) FTP_DIR="/$FTP_DIR" ;;
          esac

          case "$FTP_DIR" in
            */) ;;
            *) FTP_DIR="$FTP_DIR/" ;;
          esac

          echo "deploy_dir=$DEPLOY_DIR" >> "$GITHUB_OUTPUT"
          echo "ftp_dir=$FTP_DIR" >> "$GITHUB_OUTPUT"
          echo "SSH deploy directory: $DEPLOY_DIR"
          echo "FTP upload directory: $FTP_DIR"

      - name: Detect SSH configuration
        id: ssh_check
        run: |
          if [ -n "$CPANEL_SSH_HOST" ] && [ -n "$CPANEL_SSH_USER" ] && [ -n "$CPANEL_SSH_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload files via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ env.CPANEL_FTP_HOST }}
          username: ${{ env.CPANEL_FTP_USER }}
          password: ${{ env.CPANEL_FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: ${{ steps.paths.outputs.ftp_dir }}
          state-name: .ftp-deploy-sync-state-dev.json
          log-level: minimal
          exclude: |
            **/public/uploads/**
            **/.git*/**
            **/.git*
            **/node_modules/**
            **/.env*
            **/.github/**
            **/.DS_Store
            **/tmp/**
            **/.vscode/**
            **/.idea/**
            **/.build/**

      - name: Encode database URL for SSH
        id: deploy_db
        if: steps.ssh_check.outputs.enabled == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: echo "database_url_b64=$(printf '%s' "$DATABASE_URL" | base64 -w 0)" >> "$GITHUB_OUTPUT"

      - name: Install production dependencies and restart app
        if: steps.ssh_check.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.CPANEL_SSH_HOST }}
          username: ${{ env.CPANEL_SSH_USER }}
          key: ${{ env.CPANEL_SSH_KEY }}
          port: ${{ env.CPANEL_SSH_PORT }}
          script: |
            set -e
            set -o pipefail

            DATABASE_URL="$(printf '%s' '${{ steps.deploy_db.outputs.database_url_b64 }}' | base64 -d)"
            export DATABASE_URL

            if [ -f ~/.bashrc ]; then
              set +e
              source ~/.bashrc
              set -e
            fi

            DEPLOY_DIR="${{ steps.paths.outputs.deploy_dir }}"
            FTP_DIR="${{ steps.paths.outputs.ftp_dir }}"

            if ! cd "$DEPLOY_DIR"; then
              echo "::error::Cannot cd to DEPLOY_PATH: $DEPLOY_DIR"
              exit 1
            fi

            echo "Step: deploy diagnostics"
            echo "Deploy diagnostics:"
            echo "- SSH deploy directory: $(pwd)"
            echo "- FTP upload directory: $FTP_DIR"
            echo "- directory listing:"
            ls -la

            if [ ! -f package.json ] || [ ! -f package-lock.json ]; then
              echo "::error::package.json or package-lock.json is missing in the deploy directory."
              echo "DEPLOY_PATH must match the folder FTPS uploads to (Node app root on cPanel)."
              exit 1
            fi

            if [ -n "$DATABASE_URL" ]; then
              echo "- DATABASE_URL: present"
            else
              echo "- DATABASE_URL: missing"
            fi

            echo "- Node version: $(node --version)"

            LOCK_HASH_FILE=".package-lock.sha256"
            CURRENT_LOCK_HASH="$(sha256sum package-lock.json | awk '{print $1}')"
            PREVIOUS_LOCK_HASH=""

            if [ -f "$LOCK_HASH_FILE" ]; then
              PREVIOUS_LOCK_HASH="$(cat "$LOCK_HASH_FILE")"
            fi

            if [ ! -d node_modules ] || [ "$CURRENT_LOCK_HASH" != "$PREVIOUS_LOCK_HASH" ]; then
              echo "Step: npm ci (production dependencies)"
              echo "Installing production dependencies"
              npm ci --omit=dev --no-audit --no-fund
              printf '%s\n' "$CURRENT_LOCK_HASH" > "$LOCK_HASH_FILE"
            else
              echo "Step: skip npm ci (lockfile unchanged)"
              echo "Skipping dependency install (lockfile unchanged)"
            fi

            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL secret is required for migrations"
              exit 1
            fi

            node --input-type=module -e "import mysql from 'mysql2/promise'; const conn = await mysql.createConnection(process.env.DATABASE_URL); await conn.query('SELECT 1'); await conn.end(); console.log('Database connectivity check: OK');"

            echo "Step: db:migrate"
            npm run db:migrate
            echo "Database migrations: OK"

            node --input-type=module -e "import mysql from 'mysql2/promise'; const conn = await mysql.createConnection(process.env.DATABASE_URL); const [cols] = await conn.query(\"SHOW COLUMNS FROM users LIKE 'totp_%'\"); await conn.end(); if (cols.length < 2) { console.error('Expected totp_secret and totp_enabled columns after migration'); process.exit(1); } console.log('Migration verify: users.totp_* columns present');"

            echo "Step: restart signal"
            echo "✅ Deployment complete. Run 'node scripts/cli.js setup-token' to generate setup URL."

            mkdir -p tmp
            date > tmp/restart.txt
            echo "Restart signal written to tmp/restart.txt"

      - name: Health check - verify app responds
        if: steps.ssh_check.outputs.enabled == 'true'
        run: |
          set -e
          echo "Waiting for app to restart after deploy..."
          sleep 20

          HEALTH_URL="${{ secrets.DEV_URL || 'https://dev.joelebukatobi.dev' }}/health"
          echo "Checking health at: $HEALTH_URL"

          for i in 1 2 3 4 5 6; do
            if curl -sf "$HEALTH_URL" > /dev/null; then
              echo "✅ Health check passed - app is responding"
              curl -s "$HEALTH_URL"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "❌ Health check failed - app is not responding"
          echo "Last response:"
          curl -sv "$HEALTH_URL" 2>&1 | tail -30 || true
          echo ""
          echo "If migrations ran but health still fails, check cPanel Node app logs for startup errors."
          exit 1
