name: Deploy Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
      CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
      CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      CPANEL_SSH_HOST: ${{ secrets.CPANEL_FTP_HOST }}
      CPANEL_SSH_USER: ${{ secrets.CPANEL_FTP_USER }}
      CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies and run tests
        run: |
          npm ci --no-audit --no-fund
          npm run check:ci

      - name: Build frontend assets
        run: |
          npm run build:css
          echo "${GITHUB_SHA}" > dist/asset-version.txt
          grep -q 'blogpost__meta' dist/css/app.css || (echo "::error::Post page styles missing from CSS build output" && exit 1)
          grep -q 'blogpost__comment-field' dist/css/app.css || (echo "::error::Comment form styles missing from CSS build output" && exit 1)

      - name: Validate required deploy secrets
        run: |
          set -e
          if [ -z "$CPANEL_FTP_HOST" ]; then
            echo "::error::Missing secret: CPANEL_FTP_HOST"
            exit 1
          fi
          if [ -z "$CPANEL_FTP_USER" ]; then
            echo "::error::Missing secret: CPANEL_FTP_USER"
            exit 1
          fi
          if [ -z "$CPANEL_FTP_PASSWORD" ]; then
            echo "::error::Missing secret: CPANEL_FTP_PASSWORD"
            exit 1
          fi
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::Missing secret: DEPLOY_PATH"
            exit 1
          fi

      - name: Resolve deploy paths
        id: paths
        run: |
          set -e
          DEPLOY_DIR="$(printf '%s' "$DEPLOY_PATH" | tr -d '\r' | sed 's/^ *//;s/ *$//')"
          if [ -z "$DEPLOY_DIR" ]; then
            echo "::error::DEPLOY_PATH resolved to empty value"
            exit 1
          fi

          FTP_DIR="$DEPLOY_DIR"
          HOME_PREFIX="/home/$CPANEL_FTP_USER"
          if [ "${FTP_DIR#${HOME_PREFIX}}" != "$FTP_DIR" ]; then
            FTP_DIR="${FTP_DIR#${HOME_PREFIX}}"
          fi

          if [ -z "$FTP_DIR" ]; then
            FTP_DIR="/"
          fi

          case "$FTP_DIR" in
            /*) ;;
            *) FTP_DIR="/$FTP_DIR" ;;
          esac

          case "$FTP_DIR" in
            */) ;;
            *) FTP_DIR="$FTP_DIR/" ;;
          esac

          echo "deploy_dir=$DEPLOY_DIR" >> "$GITHUB_OUTPUT"
          echo "ftp_dir=$FTP_DIR" >> "$GITHUB_OUTPUT"
          echo "FTP upload directory: $FTP_DIR"

      - name: Detect SSH configuration
        id: ssh_check
        run: |
          if [ -n "$CPANEL_SSH_HOST" ] && [ -n "$CPANEL_SSH_USER" ] && [ -n "$CPANEL_SSH_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "SSH configured — npm ci will run automatically after upload if needed."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CPANEL_SSH_KEY not configured — skipping automated npm install. Run NPM Install manually in cPanel if node_modules is missing or the lockfile changed."
          fi

      - name: Generate Passenger restart signal
        if: steps.ssh_check.outputs.enabled != 'true'
        run: |
          set -e
          mkdir -p tmp
          date -u +"%Y-%m-%dT%H:%M:%SZ deploy ${GITHUB_SHA}" > tmp/restart.txt
          echo "Wrote restart signal:"
          cat tmp/restart.txt

      - name: Flag lockfile changes
        if: github.event_name == 'push'
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -qx 'package-lock.json'; then
              echo "::warning::package-lock.json changed in this push. Run NPM Install in cPanel before expecting a green deploy."
            fi
          else
            echo "Reminder: if package-lock.json changed, run NPM Install in cPanel Node.js App."
          fi

      - name: Upload files via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ env.CPANEL_FTP_HOST }}
          username: ${{ env.CPANEL_FTP_USER }}
          password: ${{ env.CPANEL_FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: ${{ steps.paths.outputs.ftp_dir }}
          state-name: .ftp-deploy-sync-state-dev.json
          log-level: minimal
          exclude: |
            **/public/uploads/**
            **/.git*/**
            **/.git*
            **/node_modules/**
            **/.env*
            **/.github/**
            **/.DS_Store
            **/.vscode/**
            **/.idea/**
            **/.build/**

      - name: Install production dependencies via SSH
        if: steps.ssh_check.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.CPANEL_SSH_HOST }}
          username: ${{ env.CPANEL_SSH_USER }}
          key: ${{ env.CPANEL_SSH_KEY }}
          port: 22
          script: |
            set -e
            set -o pipefail

            if [ -f ~/.bashrc ]; then
              source ~/.bashrc
            fi

            DEPLOY_DIR="${{ steps.paths.outputs.deploy_dir }}"

            if ! cd "$DEPLOY_DIR"; then
              echo "::error::Cannot cd to DEPLOY_PATH: $DEPLOY_DIR"
              exit 1
            fi

            echo "Deploy directory: $(pwd)"

            APP_NAME="$(basename "$DEPLOY_DIR")"
            NODEVENV_ACTIVATE="$(ls "$HOME"/nodevenv/"$APP_NAME"/*/bin/activate 2>/dev/null | head -1)"
            if [ -n "$NODEVENV_ACTIVATE" ]; then
              echo "Activating cPanel node virtual environment: $NODEVENV_ACTIVATE"
              # shellcheck disable=SC1090
              source "$NODEVENV_ACTIVATE"
            else
              echo "::warning::No nodevenv activate script found at $HOME/nodevenv/$APP_NAME/*/bin/activate — npm ci will use whatever node/npm is on PATH, which may not match what Passenger runs"
            fi

            if [ ! -f package.json ] || [ ! -f package-lock.json ]; then
              echo "::error::package.json or package-lock.json missing in deploy directory"
              exit 1
            fi

            echo "Node version: $(node --version 2>&1 || echo 'not found')"
            echo "npm binary: $(command -v npm 2>&1 || echo 'not found')"

            LOCK_HASH_FILE=".package-lock.sha256"
            CURRENT_LOCK_HASH="$(sha256sum package-lock.json | awk '{print $1}')"
            PREVIOUS_LOCK_HASH=""
            if [ -f "$LOCK_HASH_FILE" ]; then
              PREVIOUS_LOCK_HASH="$(cat "$LOCK_HASH_FILE")"
            fi

            if [ ! -d node_modules ] || [ "$CURRENT_LOCK_HASH" != "$PREVIOUS_LOCK_HASH" ]; then
              echo "Installing production dependencies (node_modules missing or lockfile changed)"
              npm ci --omit=dev --no-audit --no-fund
              printf '%s\n' "$CURRENT_LOCK_HASH" > "$LOCK_HASH_FILE"
            else
              echo "Skipping dependency install (lockfile unchanged)"
            fi

            mkdir -p tmp
            date -u +"%Y-%m-%dT%H:%M:%SZ deploy ${{ github.sha }}" > tmp/restart.txt
            echo "Restart signal written to tmp/restart.txt"

      - name: Health check - verify app is stable
        env:
          EXPECTED_ASSET_VERSION: ${{ github.sha }}
        run: |
          BASE_URL="${{ secrets.DEV_URL || 'https://dev.joelebukatobi.dev' }}"
          HEALTH_URL="${BASE_URL}/health"
          echo "Checking health at: $HEALTH_URL"
          bash scripts/verify-remote-health.sh "$HEALTH_URL"

      - name: Verify deployed artifacts
        run: |
          BASE_URL="${{ secrets.DEV_URL || 'https://dev.joelebukatobi.dev' }}"
          bash scripts/verify-remote-artifacts.sh "$BASE_URL" "${{ github.sha }}" 0

      - name: Smoke check - key routes and assets
        run: |
          BASE_URL="${{ secrets.DEV_URL || 'https://dev.joelebukatobi.dev' }}"
          bash scripts/verify-remote-smoke.sh "$BASE_URL" "${{ github.sha }}"
