name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: blogcms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -ptest"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: mysql://root:test@127.0.0.1:3306/blogcms_test
      JWT_SECRET: ci-test-jwt-secret-key-minimum-32-chars
      SESSION_SECRET: ci-test-session-secret-key-32-chars
      RUN_MIGRATIONS_ON_BOOT: 'false'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database
        run: |
          npm run db:migrate
          ALLOW_LOCAL_SIMULATION=true npm run db:seed -- --core

      - name: Guardrails and tests
        run: npm run check

      - name: Verify CSS build
        run: npm run build:css
